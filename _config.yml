locale: en-US
site_theme: default
title: Junteng Liu
title_separator: '-'
name: Junteng Liu
description: >-
  Personal academic homepage of Junteng Liu, a PhD candidate at HKUST NLP
  Group working on NLP, ML, LLM reasoning, vision-language models, and model interpretability.
url: https://bugmaker00.github.io
baseurl: ''
repository: danielbob0201-png/bugmaker00.github.io

author:
  avatar: profile.png
  name: Junteng Liu
  pronouns: he/him
  bio: >-
    First-year PhD candidate at HKUST NLP Group researching natural language processing
    and machine learning. Interested in LLM reasoning and reinforcement learning,
    hallucination in vision-language models, and LLM truthfulness and interpretability.
  location: Hong Kong
  employer: HKUST NLP Group
  uri: https://bugmaker00.github.io
  email: jliugi@connect.ust.hk
  googlescholar: https://scholar.google.com/citations?hl=en&user=tbK9jl4AAAAJ&view_op=list_works&sortby=pubdate
  twitter: junteng88716710

publication_category:
  books:
    title: Books
  manuscripts:
    title: Journal Articles
  conferences:
    title: Conference Papers

teaser:
breadcrumbs: false
words_per_minute: 160
future: true
read_more: disabled
talkmap_link: false
comments:
  provider: null
  disqus:
    shortname: null
  discourse:
    server: null
  facebook:
    appid: null
    num_posts: 5
    colorscheme: light
staticman:
  allowedFields:
  - name
  - email
  - url
  - message
  branch: gh-pages
  commitMessage: New comment.
  filename: comment-{@timestamp}
  format: yml
  moderation: true
  path: _data/comments/{options.slug}
  requiredFields:
  - name
  - email
  - message
  transforms:
    email: md5
  generatedFields:
    date:
      type: date
      options:
        format: iso8601
atom_feed:
  hide: false
  path: null
google_site_verification: null
bing_site_verification: null
alexa_site_verification: null
yandex_site_verification: null
twitter:
  username: junteng88716710
facebook:
  username: null
  app_id: null
  publisher: null
og_image: null
og_description: null
social:
  type: null
  name: null
  links: null
analytics:
  provider: 'false'
  google:
    tracking_id: null

include:
- .htaccess
- _pages
- files
exclude:
- '*.sublime-project'
- '*.sublime-workspace'
- .asset-cache
- .bundle
- .github
- .jekyll-assets-cache
- .sass-cache
- assets/js/_main.js
- assets/js/plugins
- assets/js/vendor
- CHANGELOG
- Capfile
- config
- Dockerfile
- Gemfile
- Gruntfile.js
- gulpfile.js
- LICENSE
- local
- log
- node_modules
- package.json*
- Rakefile
- README
- tmp
- vendor
keep_files:
- .git
- .svn
encoding: utf-8
markdown_ext: markdown,mkdown,mkdn,mkd,md

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: '\n\n'
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels:
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

defaults:
- scope:
    path: ''
    type: posts
  values:
    layout: single
    author_profile: true
    read_time: true
    comments: true
    share: true
    related: true
- scope:
    path: ''
    type: pages
  values:
    layout: single
    author_profile: true
- scope:
    path: ''
    type: teaching
  values:
    layout: single
    author_profile: true
    share: true
    comments: true
- scope:
    path: ''
    type: publications
  values:
    layout: single
    author_profile: true
    share: true
    comments: true
- scope:
    path: ''
    type: portfolio
  values:
    layout: single
    author_profile: true
    share: true
    comment: true
- scope:
    path: ''
    type: talks
  values:
    layout: talk
    author_profile: true
    share: true
    comments: true

sass:
  sass_dir: _sass
  style: compressed
permalink: /:categories/:title/
timezone: Etc/UTC

plugins:
- jekyll-feed
- jekyll-gist
- jekyll-paginate
- jekyll-sitemap
- jekyll-redirect-from
- jemoji

whitelist:
- jekyll-feed
- jekyll-gist
- jekyll-paginate
- jekyll-sitemap
- jekyll-redirect-from
- jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
